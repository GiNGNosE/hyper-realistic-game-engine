name: policy-verdict

on:
  pull_request:
  schedule:
    # Weekly drift check at 06:00 UTC every Monday.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      policy_phase:
        description: "Governance phase for applicable-rule resolution"
        required: false
        default: "pre-phase-0"
      pr_template_enforcement_mode:
        description: "PR template validation mode: enforce or advisory"
        required: false
        default: "advisory"

jobs:
  lane-runtime-benchmark:
    name: lane-runtime-benchmark
    runs-on: ubuntu-latest
    env:
      POLICY_PHASE: ${{ github.event.inputs.policy_phase || 'pre-phase-0' }}
      LPG_RUNTIME_OUTPUT: artifacts/perf/lpg-metrics.json
      RUNTIME_HARNESS_CMD: ${{ vars.RUNTIME_HARNESS_CMD || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify runtime harness command is configured
        run: |
          if [[ -z "${RUNTIME_HARNESS_CMD}" ]]; then
            echo "RUNTIME_HARNESS_CMD is not configured."
            echo "Set repository/org variable RUNTIME_HARNESS_CMD to emit artifacts/perf/lpg-metrics.json."
            exit 1
          fi
      - name: Produce runtime benchmark artifact
        run: .github/scripts/produce-runtime-benchmark-artifact.sh
      - name: Upload runtime benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: lpg-runtime-metrics
          path: artifacts/perf/lpg-metrics.json

  lane-correctness:
    name: lane-correctness
    runs-on: ubuntu-latest
    env:
      POLICY_ENV_CLASS: replay-reference
      POLICY_PHASE: ${{ github.event.inputs.policy_phase || 'pre-phase-0' }}
      LLVM_MAJOR: "18"
      ACTIONLINT_VERSION: "1.7.11"
      SHELLCHECK_VERSION: "0.11.0"
      SHFMT_VERSION: "3.12.0"
      MARKDOWNLINT_CLI2_VERSION: "0.21.0"
      YAMLLINT_VERSION: "1.38.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Emit environment fingerprint
        run: |
          mkdir -p artifacts/policy
          cat > artifacts/policy/lane-correctness-env.json <<EOF
          {
            "env_class": "${POLICY_ENV_CLASS}",
            "runner": "${RUNNER_OS}",
            "llvm_major": "${LLVM_MAJOR}",
            "note": "lint lane fingerprint"
          }
          EOF
      - name: Resolve changed paths for lint scope
        run: .github/scripts/resolve-applicable-rules.sh
      - name: Install pinned lint toolchain
        run: .github/scripts/install-lint-toolchain.sh
      - name: Run lint and static analysis suite
        run: |
          .github/scripts/run-lint-suite.sh
      - name: Upload correctness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lane-correctness
          path: |
            artifacts/policy/lane-correctness*.json
            artifacts/policy/lint-*.json

  lane-performance:
    name: lane-performance
    runs-on: ubuntu-latest
    needs:
      - lane-runtime-benchmark
    env:
      POLICY_ENV_CLASS: perf-stable-runner
      POLICY_PHASE: ${{ github.event.inputs.policy_phase || 'pre-phase-0' }}
      LPG_METRICS_INPUT: artifacts/perf/lpg-metrics.json
      LPG_TREND_HISTORY_PATH: baselines/metrics/lpg-trend-history.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download runtime benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: lpg-runtime-metrics
          path: artifacts/perf
      - name: Verify runtime benchmark artifact path
        run: |
          if [[ ! -f "artifacts/perf/lpg-metrics.json" && -f "artifacts/perf/artifacts/perf/lpg-metrics.json" ]]; then
            mkdir -p artifacts/perf
            cp "artifacts/perf/artifacts/perf/lpg-metrics.json" "artifacts/perf/lpg-metrics.json"
          fi
          if [[ ! -f "artifacts/perf/lpg-metrics.json" ]]; then
            echo "Missing runtime benchmark artifact at artifacts/perf/lpg-metrics.json"
            echo "Ensure lane-runtime-benchmark uploaded lpg-runtime-metrics with the expected file path."
            exit 1
          fi
      - name: Run performance and fidelity gate
        run: .github/scripts/run-performance-lane.sh
      - name: Generate LPG trend report
        run: python3 .github/scripts/generate-lpg-trend-report.py
      - name: Generate LPG artifact review
        run: python3 .github/scripts/review-lpg-artifacts.py
      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lane-performance
          path: |
            artifacts/policy/lane-performance*.json
            artifacts/policy/baseline-*.json
            artifacts/policy/lpg-trend-report*.json
            artifacts/policy/lpg-trend-report*.md
            artifacts/policy/lpg-artifact-review.json

  proof-enforcement:
    name: proof-enforcement
    runs-on: ubuntu-latest
    env:
      POLICY_PHASE: ${{ github.event.inputs.policy_phase || 'pre-phase-0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve applicable rules and rule inventory hash
        run: .github/scripts/resolve-applicable-rules.sh
      - name: Generate proof bootstrap artifacts
        run: .github/scripts/generate-proof-artifacts.sh
      - name: Validate rule-read receipt schema and specificity
        run: .github/scripts/validate-rule-read-receipt.sh
      - name: Validate applicable-rule coverage
        run: .github/scripts/validate-rule-coverage.sh
      - name: Validate clarification log and ambiguity mapping
        run: .github/scripts/validate-clarification-log.sh
      - name: Validate proof integrity bindings
        run: .github/scripts/validate-proof-integrity.sh
      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lane-proof-enforcement
          path: artifacts/policy/*.json

  clarification-event-gating-guardrail:
    name: clarification-event-gating-guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate clarification event-gating regression guardrail
        run: .github/scripts/validate-clarification-event-gating.sh
      - name: Upload clarification guardrail artifact
        uses: actions/upload-artifact@v4
        with:
          name: lane-clarification-event-gating-guardrail
          path: artifacts/policy/clarification-event-gating-guardrail.json

  lane-branch-governance:
    name: lane-branch-governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate branch governance
        run: .github/scripts/validate-branch-governance.sh
      - name: Upload branch governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: lane-branch-governance
          path: artifacts/policy/lane-branch-governance.json

  lane-pr-template-governance:
    name: lane-pr-template-governance
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    env:
      PR_TEMPLATE_ENFORCEMENT_MODE: ${{ github.event.inputs.pr_template_enforcement_mode || 'advisory' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate pull request template
        run: .github/scripts/validate-pr-template.sh
      - name: Upload PR template governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: lane-pr-template-governance
          path: artifacts/policy/pr-template-validation.json

  cycle-closeout-evidence:
    name: cycle-closeout-evidence
    runs-on: ubuntu-latest
    needs:
      - lane-runtime-benchmark
      - lane-performance
    env:
      POLICY_PHASE: ${{ github.event.inputs.policy_phase || 'pre-phase-0' }}
      CYCLE_ID: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download runtime benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: lpg-runtime-metrics
          path: artifacts/perf
      - name: Download lane-performance artifact
        uses: actions/download-artifact@v4
        with:
          name: lane-performance
          path: artifacts/policy
      - name: Normalize downloaded artifact paths
        run: |
          if [[ ! -f "artifacts/perf/lpg-metrics.json" && -f "artifacts/perf/artifacts/perf/lpg-metrics.json" ]]; then
            mkdir -p artifacts/perf
            cp "artifacts/perf/artifacts/perf/lpg-metrics.json" "artifacts/perf/lpg-metrics.json"
          fi
          if [[ -d "artifacts/policy/artifacts/policy" ]]; then
            cp artifacts/policy/artifacts/policy/*.json artifacts/policy/
            if compgen -G "artifacts/policy/artifacts/policy/*.md" > /dev/null; then
              cp artifacts/policy/artifacts/policy/*.md artifacts/policy/
            fi
          fi
      - name: Run cycle evidence bundle tests
        run: python3 .github/scripts/test-generate-cycle-evidence-bundle.py
      - name: Generate cycle closeout evidence bundle
        run: python3 .github/scripts/generate-cycle-evidence-bundle.py
      - name: Upload cycle closeout evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: cycle-closeout-evidence
          path: artifacts/cycle-evidence/*

  policy-verdict:
    name: policy-verdict
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lane-runtime-benchmark
      - lane-correctness
      - lane-performance
      - proof-enforcement
      - clarification-event-gating-guardrail
      - lane-branch-governance
      - lane-pr-template-governance
      - cycle-closeout-evidence
    steps:
      - name: Compute final policy verdict
        run: |
          mkdir -p artifacts/policy
          RUNTIME_BENCHMARK_STATUS="${{ needs.lane-runtime-benchmark.result }}"
          CORRECTNESS_STATUS="${{ needs.lane-correctness.result }}"
          PERFORMANCE_STATUS="${{ needs.lane-performance.result }}"
          PROOF_STATUS="${{ needs.proof-enforcement.result }}"
          CLARIFICATION_GUARDRAIL_STATUS="${{ needs.clarification-event-gating-guardrail.result }}"
          BRANCH_GOVERNANCE_STATUS="${{ needs.lane-branch-governance.result }}"
          PR_TEMPLATE_STATUS="${{ needs.lane-pr-template-governance.result }}"
          CYCLE_EVIDENCE_STATUS="${{ needs.cycle-closeout-evidence.result }}"
          IS_PULL_REQUEST_EVENT="${{ github.event_name == 'pull_request' }}"

          if [[ "${IS_PULL_REQUEST_EVENT}" == "true" ]]; then
            PR_TEMPLATE_GATE_OK="false"
            if [[ "${PR_TEMPLATE_STATUS}" == "success" ]]; then
              PR_TEMPLATE_GATE_OK="true"
            fi
          else
            PR_TEMPLATE_GATE_OK="false"
            if [[ "${PR_TEMPLATE_STATUS}" == "success" || "${PR_TEMPLATE_STATUS}" == "skipped" ]]; then
              PR_TEMPLATE_GATE_OK="true"
            fi
          fi

          if [[ "${RUNTIME_BENCHMARK_STATUS}" == "success" &&
                "${CORRECTNESS_STATUS}" == "success" &&
                "${PERFORMANCE_STATUS}" == "success" &&
                "${PROOF_STATUS}" == "success" &&
                "${CLARIFICATION_GUARDRAIL_STATUS}" == "success" &&
                "${BRANCH_GOVERNANCE_STATUS}" == "success" &&
                "${CYCLE_EVIDENCE_STATUS}" == "success" &&
                "${PR_TEMPLATE_GATE_OK}" == "true" ]]; then
            VERDICT="pass"
          else
            VERDICT="fail"
          fi

          cat > artifacts/policy/final-verdict.json <<EOF
          {
            "status": "${VERDICT}",
            "authority": "automated-review-board",
            "lane_results": {
              "lane-runtime-benchmark": "${RUNTIME_BENCHMARK_STATUS}",
              "lane-correctness": "${CORRECTNESS_STATUS}",
              "lane-performance": "${PERFORMANCE_STATUS}",
              "proof-enforcement": "${PROOF_STATUS}",
              "clarification-event-gating-guardrail": "${CLARIFICATION_GUARDRAIL_STATUS}",
              "lane-branch-governance": "${BRANCH_GOVERNANCE_STATUS}",
              "cycle-closeout-evidence": "${CYCLE_EVIDENCE_STATUS}",
              "lane-pr-template-governance": "${PR_TEMPLATE_STATUS}"
            }
          }
          EOF

          if [[ "${VERDICT}" != "pass" ]]; then
            echo "policy-verdict failed because one or more required lanes did not pass."
            exit 1
          fi
      - name: Upload verdict artifact
        uses: actions/upload-artifact@v4
        with:
          name: policy-verdict
          path: artifacts/policy/final-verdict.json
